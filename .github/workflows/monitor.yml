name: Laptop Outlet Monitor

on:
  schedule:
    - cron: '30 * * * *'  # Runs every hour at minute 30
  push:
    branches:
      - main
  workflow_dispatch:      # Allows manual execution from the GitHub Actions tab

permissions:
  contents: write         # Allows the workflow to commit and push database changes back to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        playwright install chromium

    - name: Run Monitor Scraper
      env:
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'dubey_laptop_alerts_2026' }}
      run: |
        python monitor.py

    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add products_db.json
        git commit -m "Auto-update products database [skip ci]" || echo "No changes to commit"
        git push
